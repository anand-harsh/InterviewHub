spring.application.name=mock-interview-platform
# Application Configuration
server.port=5678

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3333/interviewdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration
jwt.secret=wodg7wdt3gr7938e0@@!)(y8ey3yg9f3fhoehf
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=harshanand0220@gmail.com
spring.mail.password=wyzxohikhlutechh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application URLs
app.url=http://localhost:8080
app.frontend.url=http://localhost:3000

# Email Templates
app.email.verification.subject=Verify Your Email - Mock Interview Platform
app.email.password-reset.subject=Reset Your Password - Mock Interview Platform
app.email.from-name=Mock Interview Platform

# Token Expiration (in hours)
app.token.email-verification-expiry=24
app.token.password-reset-expiry=1

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging
logging.level.root=INFO
logging.level.com.mockinterview=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true